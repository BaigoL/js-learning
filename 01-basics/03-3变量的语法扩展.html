<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //1.更新变量
        var myname = 'BaigoL';
        console.log(myname);
        myname = '小菜鸡';
        console.log(myname);
        //2.声名多个变量
        var name = 'BaigoL', age = 22, address = '中国';
        console.log(name,age,address);
        //3.声明变量的特殊情况
        //3.1 只声明不赋值，变量默认值是undefined
        var sex;
        console.log(sex);
        //3.2 不声明不赋值直接使用变量，报错
        // console.log(age);
        //3.3 不声明直接赋值，使用变量，不推荐
        qq = 123456;
        console.log(qq);
    </script>
</body>
</html>
